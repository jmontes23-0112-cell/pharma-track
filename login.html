<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaStock — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-900: #14532d;
      --green-800: #166534;
      --green-700: #15803d;
      --green-600: #16a34a;
      --green-500: #22c55e;
      --green-400: #4ade80;
      --green-100: #dcfce7;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, var(--green-900) 0%, #0a1a0f 50%, #052e16 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: -100px; left: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(34,197,94,.15) 0%, transparent 70%);
      border-radius: 50%;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -100px; right: -100px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(22,163,74,.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    .login-card {
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 20px 60px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.05);
      animation: fadeUp .5s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-icon {
      width: 64px; height: 64px;
      background: var(--green-600);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin: 0 auto 14px;
      box-shadow: 0 4px 20px rgba(22,163,74,.4);
    }

    .login-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .login-sub {
      font-size: .875rem;
      color: rgba(255,255,255,.5);
      margin-top: 4px;
    }

    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: rgba(255,255,255,.5);
      margin-bottom: 8px;
    }

    .form-control {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      color: #fff;
      font-size: .95rem;
      font-family: 'DM Sans', sans-serif;
      transition: all .2s;
      outline: none;
    }

    .form-control::placeholder { color: rgba(255,255,255,.25); }

    .form-control:focus {
      border-color: var(--green-500);
      background: rgba(34,197,94,.08);
      box-shadow: 0 0 0 3px rgba(34,197,94,.15);
    }

    .role-select {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .role-btn {
      padding: 12px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      color: rgba(255,255,255,.6);
      font-family: 'DM Sans', sans-serif;
    }

    .role-btn.active {
      background: rgba(22,163,74,.2);
      border-color: var(--green-500);
      color: var(--green-400);
    }

    .role-btn .role-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    .role-btn .role-name { font-size: .8rem; font-weight: 600; }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--green-700);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 4px 20px rgba(22,163,74,.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .login-btn:hover {
      background: var(--green-600);
      box-shadow: 0 6px 28px rgba(22,163,74,.45);
      transform: translateY(-1px);
    }

    .login-btn:active { transform: translateY(0); }

    .divider {
      text-align: center;
      color: rgba(255,255,255,.2);
      font-size: .75rem;
      margin: 20px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: rgba(255,255,255,.1);
    }

    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .demo-hint {
      text-align: center;
      background: rgba(34,197,94,.08);
      border: 1px solid rgba(34,197,94,.15);
      border-radius: 8px;
      padding: 12px;
      margin-top: 16px;
      font-size: .8rem;
      color: rgba(255,255,255,.5);
      line-height: 1.6;
    }

    .demo-hint strong { color: var(--green-400); }

    .toast {
      position: fixed;
      top: 20px; right: 20px;
      background: #fff;
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 32px rgba(0,0,0,.2);
      font-size: .875rem;
      font-weight: 500;
      z-index: 9999;
      animation: slideIn .3s ease;
      border-left: 4px solid var(--green-500);
    }

    @keyframes slideIn { from { opacity:0; transform:translateX(100%); } to { opacity:1; transform:translateX(0); } }

    @media (max-width:480px) {
      .login-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-brand">
    <div class="login-icon">💊</div>
    <div class="login-title">PharmaStock</div>
    <div class="login-sub">Pharmacy Inventory & POS System</div>
  </div>

  <div class="form-group">
    <label class="form-label">Username / Email</label>
    <input type="text" class="form-control" id="username" placeholder="admin@pharmastock.ph" value="admin">
  </div>

  <div class="form-group">
    <label class="form-label">Password</label>
    <input type="password" class="form-control" id="password" placeholder="••••••••" value="admin123">
  </div>

  <div style="margin-bottom:20px">
    <label class="form-label">Login As</label>
    <div class="role-select">
      <div class="role-btn active" id="roleAdmin" onclick="selectRole('admin')">
        <span class="role-icon">👑</span>
        <span class="role-name">Admin</span>
      </div>
      <div class="role-btn" id="roleCashier" onclick="selectRole('cashier')">
        <span class="role-icon">💼</span>
        <span class="role-name">Cashier</span>
      </div>
    </div>
  </div>

  <button class="login-btn" onclick="doLogin()">
    <span>🔐</span> Login to System
  </button>

  <div class="demo-hint">
    <strong>Demo credentials:</strong><br>
    Username: <strong>admin</strong> | Password: <strong>admin123</strong>
  </div>
</div>

<script>
  let selectedRole = 'admin';

  function selectRole(role) {
    selectedRole = role;
    document.getElementById('roleAdmin').classList.toggle('active', role === 'admin');
    document.getElementById('roleCashier').classList.toggle('active', role === 'cashier');
  }

  function doLogin() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();

    if (!user || !pass) {
      toast('Please fill in all fields', 'error'); return;
    }

    // Demo auth
    const validUsers = {
      admin:   'admin123',
      cashier: 'cashier123',
    };

    if ((user === 'admin' || user === 'admin@pharmastock.ph') && pass === 'admin123') {
      localStorage.setItem('pharmastock_user', JSON.stringify({ name: 'Admin User', role: 'admin' }));
      toast('Login successful! Welcome, Admin 👋', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    } else if (user === 'cashier' && pass === 'cashier123') {
      localStorage.setItem('pharmastock_user', JSON.stringify({ name: 'Cashier', role: 'cashier' }));
      toast('Login successful! Welcome, Cashier 👋', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    } else {
      toast('Invalid credentials. Try admin / admin123', 'error');
    }
  }

  function toast(msg, type) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.style.borderLeftColor = type === 'error' ? '#ef4444' : '#22c55e';
    el.innerHTML = `<span>${type === 'error' ? '❌' : '✅'}</span><span>${msg}</span>`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  // Allow Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>

</body>
</html>
